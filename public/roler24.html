<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 乱涂彩社区</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: #f0f2f5; color: #333; }
        .admin-header { background: linear-gradient(135deg, #6C5CE7, #00CEC9); color: white; padding: 20px 30px; }
        .admin-header h1 { font-size: 22px; }
        .admin-header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
        .admin-container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        
        .section-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .section-tab { padding: 10px 20px; background: white; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.2s; font-weight: 500; }
        .section-tab.active { background: #6C5CE7; color: white; border-color: #6C5CE7; }
        .section-tab .count-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; border-radius: 10px; font-size: 11px; font-weight: 700; padding: 0 6px; margin-left: 6px; background: rgba(255,255,255,0.2); }
        .section-tab.active .count-badge { background: rgba(255,255,255,0.3); }
        
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card h3 { font-size: 16px; margin-bottom: 12px; color: #6C5CE7; }
        
        .item-card { border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 12px; }
        .item-card.pending { border-left: 4px solid #FDCB6E; }
        .item-card.approved { border-left: 4px solid #00CEC9; }
        .item-card.rejected { border-left: 4px solid #FD79A8; }
        .item-card.resolved { border-left: 4px solid #00CEC9; }
        .item-card.dismissed { border-left: 4px solid #999; }
        
        .info-row { display: flex; gap: 20px; flex-wrap: wrap; font-size: 13px; margin-bottom: 6px; }
        .info-row span { color: #888; }
        .info-row b { color: #333; }
        
        .actions { margin-top: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #6C5CE7; color: white; }
        .btn-approve { background: #00CEC9; color: white; }
        .btn-reject { background: #FD79A8; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-restore { background: #FDCB6E; color: #333; }
        .btn-secondary { background: #bbb; color: white; }
        
        .note-input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; min-width: 120px; }
        
        .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
        
        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        .filter-bar select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
        
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-pending { background: #FFF3CD; color: #856404; }
        .badge-approved, .badge-resolved { background: #D4EDDA; color: #155724; }
        .badge-rejected { background: #F8D7DA; color: #721C24; }
        .badge-dismissed { background: #e9ecef; color: #6c757d; }
        
        .login-box { max-width: 400px; margin: 80px auto; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .login-box button { width: 100%; padding: 12px; background: #6C5CE7; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        .login-box button:hover { background: #5849e0; }
        .error-msg { color: #FD79A8; font-size: 13px; margin-top: 8px; }
        
        .content-section { display: none; }
        .content-section.active { display: block; }
        
        .target-preview { background: #f9f9fb; border-radius: 8px; padding: 10px; margin: 8px 0; font-size: 12px; line-height: 1.6; color: #555; }
        .target-preview b { color: #333; }
    </style>
</head>
<body>

<div class="admin-header">
    <h1>🔧 乱涂彩社区 · 管理后台</h1>
    <p id="adminSubtitle">排行榜审核 + 举报管理 + 用户管理</p>
</div>

<!-- 登录区域 -->
<div id="loginSection" class="login-box">
    <div class="card">
        <h3>管理员登录</h3>
        <input type="text" id="loginUser" placeholder="用户名">
        <input type="password" id="loginPass" placeholder="密码">
        <div id="captcha-section" style="margin:8px 0;">
            <label style="font-size:13px;color:#666;display:block;margin-bottom:4px;" id="captcha-question">验证码加载中...</label>
            <input type="text" id="captchaAnswer" placeholder="输入计算结果" style="width:100%;padding:12px;margin:4px 0;border:1px solid #ddd;border-radius:8px;font-size:14px;">
        </div>
        <button onclick="adminLogin()">登录</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- 管理面板 -->
<div id="adminPanel" style="display:none;">
    <div class="admin-container">
        <!-- 一级标签页 -->
        <div class="section-tabs">
            <div class="section-tab active" onclick="switchSection('rank', this)">
                📋 排行榜审核
            </div>
            <div class="section-tab" onclick="switchSection('report', this)">
                ⚠️ 举报管理 <span class="count-badge" id="reportCount">0</span>
            </div>
            <div class="section-tab" onclick="switchSection('post', this)">
                📝 帖子管理
            </div>
            <div class="section-tab" onclick="switchSection('user', this)">
                👤 用户管理 <span class="count-badge" id="userCount">0</span>
            </div>
            <div class="section-tab" onclick="switchSection('ipblacklist', this)">
                🚫 IP黑名单 <span class="count-badge" id="ipCount">0</span>
            </div>
            <div class="section-tab" onclick="switchSection('recycle', this)">
                ♻️ 回收站
            </div>
        </div>

        <!-- ===== 排行榜审核区 ===== -->
        <div id="section-rank" class="content-section active">
            <div class="tabs" style="display:flex;gap:10px;margin-bottom:15px;">
                <div class="tab active" onclick="loadApplications('pending', event)">待审核</div>
                <div class="tab" onclick="loadApplications('approved', event)">已通过</div>
                <div class="tab" onclick="loadApplications('rejected', event)">已拒绝</div>
                <div class="tab" onclick="loadApplications('all', event)">全部</div>
            </div>
            <div class="filter-bar">
                <select id="filterType" onchange="reloadRankList()">
                    <option value="">全部榜单</option>
                    <option value="thanks">鸣谢榜</option>
                    <option value="sponsor">赞助榜</option>
                    <option value="master">大神榜</option>
                </select>
            </div>
            <div id="rankAppList"></div>
        </div>

        <!-- ===== 举报管理区 ===== -->
        <div id="section-report" class="content-section">
            <div class="filter-bar">
                <select id="reportFilter" onchange="loadReports()">
                    <option value="pending">待处理</option>
                    <option value="resolved">已处理</option>
                    <option value="dismissed">已驳回</option>
                    <option value="all">全部</option>
                </select>
            </div>
            <div id="reportList"></div>
        </div>

        <!-- ===== 帖子管理区 ===== -->
        <div id="section-post" class="content-section">
            <div class="filter-bar">
                <input type="text" id="postSearch" class="note-input" placeholder="搜索帖子标题..." style="max-width:300px;">
                <button class="btn btn-primary" onclick="searchPosts()">搜索</button>
            </div>
            <div id="postList"></div>
        </div>

        <!-- ===== 用户管理区 ===== -->
        <div id="section-user" class="content-section">
            <div class="filter-bar">
                <input type="text" id="userSearch" class="note-input" placeholder="搜索用户名/昵称/UID..." style="max-width:300px;">
                <select id="userRoleFilter" onchange="loadUsers()">
                    <option value="">全部用户</option>
                    <option value="admin">仅管理员</option>
                    <option value="user">仅普通用户</option>
                </select>
                <button class="btn btn-primary" onclick="loadUsers()">搜索</button>
            </div>
            <div id="userList"></div>
        </div>

        <!-- ===== IP黑名单区 ===== -->
        <div id="section-ipblacklist" class="content-section">
            <div class="filter-bar">
                <input type="text" id="newIpInput" class="note-input" placeholder="输入要封禁的IP..." style="max-width:250px;">
                <input type="text" id="newIpReason" class="note-input" placeholder="封禁原因（选填）" style="max-width:200px;">
                <button class="btn btn-danger" onclick="addIpBlock()">封禁</button>
            </div>
            <div id="ipBlacklist"></div>
        </div>

        <!-- ===== 回收站区 ===== -->
        <div id="section-recycle" class="content-section">
            <div class="filter-bar">
                <select id="recycleType" onchange="loadRecycle()">
                    <option value="posts">已删除帖子</option>
                    <option value="comments">已删除评论</option>
                </select>
                <button class="btn btn-primary" onclick="loadRecycle()">刷新</button>
                <button class="btn btn-danger" onclick="cleanupOldPosts()">清理0互动老帖</button>
            </div>
            <div id="recycleList"></div>
        </div>
    </div>
</div>

<script>
const API_BASE = '/api';
let token = localStorage.getItem('adminToken') || '';
let currentRankStatus = 'pending';
let currentCaptchaId = '';

// 页面加载时获取数学题
loadCaptcha();

async function loadCaptcha() {
    try {
        const res = await fetch(API_BASE + '/auth/captcha');
        const data = await res.json();
        if (data.error) {
            document.getElementById('captcha-question').textContent = data.error;
            return;
        }
        currentCaptchaId = data.captchaId;
        document.getElementById('captcha-question').textContent = '验证码: ' + data.question;
    } catch(e) {
        document.getElementById('captcha-question').textContent = '验证码加载失败';
    }
}

// 检查登录
if (token) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadApplications('pending');
    loadReports();
}

// ===== 管理登录 =====
async function adminLogin() {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value;
    const captchaAnswer = document.getElementById('captchaAnswer').value.trim();
    if (!username || !password) {
        document.getElementById('loginError').textContent = '请填写用户名和密码';
        return;
    }
    if (!captchaAnswer) {
        document.getElementById('loginError').textContent = '请输入验证码';
        return;
    }
    try {
        const res = await fetch(API_BASE + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, captchaId: currentCaptchaId, captchaAnswer })
        });
        const data = await res.json();
        if (data.error) {
            document.getElementById('loginError').textContent = data.error;
            loadCaptcha(); // 重新加载验证码
            return;
        }
        token = data.token;
        localStorage.setItem('adminToken', token);
        const meRes = await fetch(API_BASE + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
        const me = await meRes.json();
        if (me.role !== 'admin') {
            document.getElementById('loginError').textContent = '该账号不是管理员，无权访问';
            localStorage.removeItem('adminToken'); return;
        }
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadApplications('pending');
        loadReports();
    } catch (e) {
        document.getElementById('loginError').textContent = '网络错误: ' + e.message;
        loadCaptcha();
    }
}

// ===== 标签页切换 =====
function switchSection(name, el) {
    document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('section-' + name).classList.add('active');
    if (name === 'report') loadReports();
    if (name === 'post') searchPosts();
    if (name === 'user') loadUsers();
    if (name === 'ipblacklist') loadIpBlacklist();
    if (name === 'recycle') loadRecycle();
}

// ===== 排行榜审核 =====
function loadApplications(status, evt) {
    currentRankStatus = status;
    if (evt) {
        document.querySelectorAll('#section-rank .tab').forEach(t => t.classList.remove('active'));
        evt.target.classList.add('active');
    }
    reloadRankList();
}

function reloadRankList() {
    const type = document.getElementById('filterType').value;
    let url = API_BASE + '/admin/ranks/applications?status=' + currentRankStatus;
    if (type) url += '&type=' + type;
    fetchWithAuth(url).then(data => {
        const container = document.getElementById('rankAppList');
        if (!data.applications || data.applications.length === 0) {
            container.innerHTML = '<div class="empty">暂无申请记录</div>'; return;
        }
        const typeNames = { thanks: '鸣谢榜', sponsor: '赞助榜', master: '大神榜' };
        const statusNames = { pending: '待审核', approved: '已通过', rejected: '已拒绝' };
        container.innerHTML = data.applications.map(app => `
            <div class="item-card ${app.status}">
                <div class="info-row"><span>榜单:</span><b>${typeNames[app.type]||app.type}</b> <span>状态:</span><span class="badge badge-${app.status}">${statusNames[app.status]}</span></div>
                <div class="info-row"><span>昵称:</span><b>${app.nickname}</b> <span>用户:</span><b>${app.username||'-'}</b></div>
                <div class="info-row"><span>区服:</span><b>${app.server||'-'}</b> <span>UID:</span><b>${app.gameUid||'-'}</b></div>
                <div class="info-row"><span>社团:</span><b>${app.guildName||'-'}</b> <span>赞助额:</span><b>${app.sponsorAmount||0}元</b></div>
                <div class="info-row"><span>签名:</span><b>${app.signature||'-'}</b></div>
                <div class="info-row"><span>申请时间:</span><b>${app.createdAt}</b></div>
                ${app.adminNote ? `<div class="info-row"><span>审核备注:</span><b>${app.adminNote}</b></div>` : ''}
                ${app.status === 'pending' ? `
                <div class="actions">
                    <input type="text" class="note-input" id="rankNote-${app.id}" placeholder="审核备注（选填）">
                    <input type="number" class="note-input" id="rankOrder-${app.id}" placeholder="排序号" style="max-width:80px;">
                    <button class="btn btn-approve" onclick="reviewRankApp(${app.id},'approve')">批准</button>
                    <button class="btn btn-reject" onclick="reviewRankApp(${app.id},'reject')">拒绝</button>
                </div>` : ''}
            </div>
        `).join('');
    }).catch(() => document.getElementById('rankAppList').innerHTML = '<div class="empty">加载失败</div>');
}

async function reviewRankApp(id, action) {
    const note = document.getElementById('rankNote-' + id).value;
    const orderInput = document.getElementById('rankOrder-' + id);
    const rankOrder = orderInput ? parseInt(orderInput.value) || 0 : 0;
    if (action === 'reject' && !note && !confirm('确定拒绝？（未填写原因）')) return;
    if (action === 'approve' && !confirm('确定批准？将自动加入排行榜。')) return;
    try {
        const data = await fetchWithAuth(API_BASE + '/admin/ranks/review', {
            method: 'POST', body: JSON.stringify({ applicationId: id, action, rankOrder, adminNote: note })
        });
        alert(data.message); reloadRankList();
    } catch(e) { alert('失败: ' + e.message); }
}

// ===== 举报管理 =====
async function loadReports() {
    const status = document.getElementById('reportFilter').value;
    try {
        const data = await fetchWithAuth(API_BASE + '/admin/reports?status=' + status);
        const container = document.getElementById('reportList');
        if (!data.reports || data.reports.length === 0) {
            container.innerHTML = '<div class="empty">暂无举报记录</div>'; return;
        }
        const statusNames = { pending: '待处理', resolved: '已处理', dismissed: '已驳回' };
        container.innerHTML = data.reports.map(r => {
            const targetHtml = r.target ? (
                r.type === 'post'
                    ? `<div class="target-preview">📄 <b>帖子</b>：「${r.target.title||'无标题'}」 作者: ${r.target.author||'-'} ${r.target.isDeleted ? '<span style="color:#e74c3c">[已删除]</span>' : ''}</div>`
                    : `<div class="target-preview">💬 <b>评论</b>：「${(r.target.content||'').substring(0,80)}」 作者: ${r.target.author||'-'} ${r.target.postTitle ? '｜帖子：「'+r.target.postTitle+'」' : ''}</div>`
            ) : '';
            return `
            <div class="item-card ${r.status}">
                <div class="info-row"><span>举报类型:</span><b>${r.type==='post'?'帖子':'评论'}</b> <span>状态:</span><span class="badge badge-${r.status}">${statusNames[r.status]||r.status}</span></div>
                <div class="info-row"><span>举报人:</span><b>${r.username||'-'}</b> <span>时间:</span><b>${r.createdAt}</b></div>
                ${r.reason ? `<div class="info-row"><span>举报原因:</span><b>${r.reason}</b></div>` : ''}
                ${targetHtml}
                ${r.status === 'pending' ? `
                <div class="actions">
                    <button class="btn btn-approve" onclick="reviewReport(${r.id},'resolve',false)">处理（保留内容）</button>
                    <button class="btn btn-danger" onclick="reviewReport(${r.id},'resolve',true)">删除内容</button>
                    <button class="btn btn-secondary" onclick="reviewReport(${r.id},'dismiss',false)">驳回举报</button>
                </div>` : ''}
            </div>`;
        }).join('');
    } catch(e) { document.getElementById('reportList').innerHTML = '<div class="empty">加载失败</div>'; }
}

async function reviewReport(id, action, deleteTarget) {
    const label = action === 'resolve' ? (deleteTarget ? '删除违规内容' : '标记已处理') : '驳回举报';
    if (!confirm(`确定${label}？`)) return;
    try {
        const data = await fetchWithAuth(API_BASE + '/admin/reports/review', {
            method: 'POST', body: JSON.stringify({ reportId: id, action, deleteTarget })
        });
        alert(data.message); loadReports();
    } catch(e) { alert('失败: ' + e.message); }
}

// ===== 帖子管理 =====
async function searchPosts() {
    const q = document.getElementById('postSearch').value.trim();
    try {
        const data = await fetchWithAuth(API_BASE + '/posts?search=' + encodeURIComponent(q) + '&limit=50');
        const container = document.getElementById('postList');
        if (!data.posts || data.posts.length === 0) {
            container.innerHTML = '<div class="empty">暂无帖子</div>'; return;
        }
        container.innerHTML = data.posts.map(p => `
            <div class="item-card">
                <div class="info-row"><span>标题:</span><b>${p.title}</b> <span>作者:</span><b>${p.author}</b></div>
                <div class="info-row"><span>时间:</span><b>${p.createdAt}</b> <span>ID:</span><b>${p.id}</b></div>
                <div class="actions">
                    <button class="btn btn-reject" onclick="adminDeletePost(${p.id})">软删除</button>
                    <button class="btn btn-danger" onclick="adminHardDeletePost(${p.id})">永久删除</button>
                </div>
            </div>
        `).join('');
    } catch(e) { document.getElementById('postList').innerHTML = '<div class="empty">加载失败</div>'; }
}

async function adminDeletePost(id) {
    if (!confirm(`确定软删除帖子 #${id}？`)) return;
    try {
        const data = await fetchWithAuth(API_BASE + '/posts/' + id + '/delete', { method: 'POST' });
        alert(data.message); searchPosts();
    } catch(e) { alert('失败: ' + e.message); }
}

async function adminHardDeletePost(id) {
    if (!confirm(`⚠️ 确定永久删除帖子 #${id}？此操作不可撤销！`)) return;
    try {
        const data = await fetchWithAuth(API_BASE + '/posts/' + id + '/hard-delete', { method: 'POST' });
        alert(data.message); searchPosts();
    } catch(e) { alert('失败: ' + e.message); }
}

// ===== 用户管理 =====
async function loadUsers() {
    const search = document.getElementById('userSearch').value.trim();
    const role = document.getElementById('userRoleFilter').value;
    let url = API_BASE + '/admin/users?limit=200';
    if (search) url += '&search=' + encodeURIComponent(search);
    if (role) url += '&role=' + role;
    try {
        const data = await fetchWithAuth(url);
        const container = document.getElementById('userList');
        document.getElementById('userCount').textContent = data.total || 0;
        if (!data.users || data.users.length === 0) {
            container.innerHTML = '<div class="empty">暂无用户</div>'; return;
        }
        container.innerHTML = data.users.map(u => `
            <div class="item-card ${u.role === 'admin' ? 'approved' : ''}">
                <div class="info-row">
                    <span>用户名:</span><b>${u.username}</b>
                    <span>昵称:</span><b>${u.nickname}</b>
                    <span>UID:</span><b>${u.uid}</b>
                    ${u.role === 'admin' ? '<span class="badge badge-approved">管理员</span>' : ''}
                </div>
                <div class="info-row">
                    <span>等级:</span><b>Lv.${u.level}</b>
                    <span>经验:</span><b>${u.exp}</b>
                    <span>瓶盖:</span><b>${u.caps}</b>
                    <span>改名次数:</span><b>${u.renameCount}</b>
                </div>
                <div class="info-row">
                    <span>邮箱:</span><b>${u.email || '未绑定'}${u.email && u.emailVerified ? ' ✓' : ''}</b>
                    <span>注册时间:</span><b>${u.createdAt}</b>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="resetUserPassword(${u.id}, '${u.nickname}')">重置密码</button>
                </div>
            </div>
        `).join('');
    } catch(e) { document.getElementById('userList').innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>'; }
}

async function resetUserPassword(userId, nickname) {
    const newPwd = prompt(`重置用户「${nickname}」的密码\n请输入新密码（至少6位）：`);
    if (!newPwd) return;
    if (newPwd.length < 6) { alert('密码至少6位'); return; }
    if (!confirm(`确定将用户「${nickname}」的密码重置为：「${newPwd}」？\n该用户的所有登录将立即失效。`)) return;
    try {
        const data = await fetchWithAuth(API_BASE + '/admin/users/' + userId + '/reset-password', {
            method: 'POST', body: JSON.stringify({ password: newPwd })
        });
        alert(data.message); loadUsers();
    } catch(e) { alert('失败: ' + e.message); }
}

// ===== IP黑名单管理 =====
async function loadIpBlacklist() {
    try {
        const data = await fetchWithAuth(API_BASE + '/admin/ip-blacklist');
        const container = document.getElementById('ipBlacklist');
        document.getElementById('ipCount').textContent = data.blacklist.length;
        if (data.blacklist.length === 0) {
            container.innerHTML = '<div class="empty">黑名单为空</div>'; return;
        }
        container.innerHTML = data.blacklist.map(item => `
            <div class="item-card dismissed">
                <div class="info-row"><span>IP:</span><b>${item.ip}</b> <span>时间:</span><b>${item.created_at}</b></div>
                <div class="info-row"><span>备注:</span><b>${item.reason}</b></div>
                <div class="actions">
                    <input type="text" class="note-input" value="${item.reason}" placeholder="修改备注" id="ip-reason-${item.id}">
                    <button class="btn btn-secondary" onclick="updateIpReason(${item.id})">改备注</button>
                    <button class="btn btn-approve" onclick="removeIpBlock(${item.id})">解封</button>
                </div>
            </div>
        `).join('');
    } catch(e) { document.getElementById('ipBlacklist').innerHTML = '<div class="empty">加载失败</div>'; }
}

async function addIpBlock() {
    const ip = document.getElementById('newIpInput').value.trim();
    const reason = document.getElementById('newIpReason').value.trim();
    if (!ip) { alert('请输入IP地址'); return; }
    try {
        const data = await fetchWithAuth(API_BASE + '/admin/ip-blacklist', {
            method: 'POST', body: JSON.stringify({ ip, reason: reason || '管理员手动封禁' })
        });
        alert(data.message);
        document.getElementById('newIpInput').value = '';
        document.getElementById('newIpReason').value = '';
        loadIpBlacklist();
    } catch(e) { alert('失败: ' + e.message); }
}

async function updateIpReason(id) {
    const reason = document.getElementById('ip-reason-' + id).value;
    try {
        await fetchWithAuth(API_BASE + '/admin/ip-blacklist', {
            method: 'PUT', body: JSON.stringify({ id, reason })
        });
        loadIpBlacklist();
    } catch(e) { alert('失败: ' + e.message); }
}

async function removeIpBlock(id) {
    if (!confirm('确定解封此IP？')) return;
    try {
        const data = await fetchWithAuth(API_BASE + '/admin/ip-blacklist/' + id, { method: 'DELETE' });
        alert(data.message); loadIpBlacklist();
    } catch(e) { alert('失败: ' + e.message); }
}

// ===== 回收站 =====
async function loadRecycle() {
    const type = document.getElementById('recycleType').value;
    try {
        const data = await fetchWithAuth(API_BASE + '/admin/recycle?type=' + type);
        const container = document.getElementById('recycleList');
        if (data.items.length === 0) {
            container.innerHTML = '<div class="empty">回收站为空</div>'; return;
        }
        container.innerHTML = data.items.map(item => `
            <div class="item-card rejected">
                ${type === 'posts' ? `
                    <div class="info-row"><span>标题:</span><b>${item.title}</b> <span>作者:</span><b>${item.author_name}</b></div>
                    <div class="info-row"><span>删除时间:</span><b>${item.deleted_at}</b></div>
                    <div class="actions">
                        <button class="btn btn-approve" onclick="restoreItem(${item.id})">恢复</button>
                        <button class="btn btn-danger" onclick="hardDeleteItem(${item.id})">永久删除</button>
                    </div>
                ` : `
                    <div class="info-row"><span>内容:</span><b>${(item.content || '').substring(0, 80)}</b></div>
                    <div class="info-row"><span>作者:</span><b>${item.author_name}</b> <span>删除时间:</span><b>${item.deleted_at}</b></div>
                    <div class="actions">
                        <button class="btn btn-approve" onclick="restoreItem(${item.id})">恢复</button>
                        <button class="btn btn-danger" onclick="hardDeleteItem(${item.id})">永久删除</button>
                    </div>
                `}
            </div>
        `).join('');
    } catch(e) { document.getElementById('recycleList').innerHTML = '<div class="empty">加载失败</div>'; }
}

async function restoreItem(id) {
    if (!confirm('确定恢复此内容？')) return;
    try {
        const data = await fetchWithAuth(API_BASE + '/admin/recycle/' + id + '/restore', { method: 'POST' });
        alert(data.message); loadRecycle();
    } catch(e) { alert('失败: ' + e.message); }
}

async function hardDeleteItem(id) {
    if (!confirm('⚠️ 确定永久删除？此操作不可撤销！')) return;
    try {
        const data = await fetchWithAuth(API_BASE + '/admin/recycle/' + id + '/hard-delete', { method: 'POST' });
        alert(data.message); loadRecycle();
    } catch(e) { alert('失败: ' + e.message); }
}

// ===== 帖子清理 =====
async function cleanupOldPosts() {
    if (!confirm('确定清理0赞0评论且超过30天的帖子？')) return;
    try {
        const data = await fetchWithAuth(API_BASE + '/admin/cleanup', {
            method: 'POST', body: JSON.stringify({ days: 30 })
        });
        alert(data.message); loadRecycle();
    } catch(e) { alert('失败: ' + e.message); }
}

// ===== 通用请求 =====
async function fetchWithAuth(url, options = {}) {
    const res = await fetch(url, {
        ...options,
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            ...(options.headers || {})
        }
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
}
